<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    
    <main class="container-fluid d-flex justify-content-center align-items-center min-vh-100">
        <div class="container-section p-4">
          <h1 class="day" id="day">Today</h1>
          <div class="row justify-content-center g-3">
            <div class="col-12 col-sm-6 col-md-3">
              <div class="clock gy-5 mt-5">
                <div class="front-clock">
                  <div class="display-3" id="hour">00</div>
                  <p class="fs-5">Hour</p>
                </div>
              </div>
            </div>
            <div class="col-12 col-sm-6 col-md-3">
              <div class="clock gy-5 mt-5">
                <div class="front-clock">
                  <div  class="display-3" id="minute">00</div>
                  <p class="fs-5">Minute</p>
                </div>
              </div>
            </div>
            <div class="col-12 col-sm-6 col-md-3">
              <div class="clock gy-5 mt-5">
                <div class="front-clock">
                  <div  class="display-3" id="second">00</div>
                  <p class="fs-5">Second</p>
                </div>
              </div>
            </div>
            <div class="col-12 col-sm-6 col-md-3">
              <div class="clock gy-5 mt-5">
                <div class="front-clock  " >
                  <div  class="display-5 text-center mt-4" id="period">AM</div>
                 
                </div>
              </div>
            </div>
          </div>
        </div>
      </main>

    <script src="aap.js"></script>



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>
</body>

</html>
