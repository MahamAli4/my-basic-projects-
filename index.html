<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Food Finder / Recipe Finder</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container py-5">
    <h1 class="text-center text-success display-4 mb-4 text-shadow">Recipe Finder</h1>
    
    <!-- Search Section -->
    <div class="row justify-content-center mb-4">
      <div class="col-md-8 d-flex flex-column flex-sm-row gap-3">
        <input type="text" class="form-control ingrideints" placeholder="Enter find Recipes Name!...." />
        <button id="btn" class="btn btn-success w-50 w-sm-auto">Search</button>
      </div>
    </div>

    <!-- Results Section -->
    <div class="row g-4 receipeResult">
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
