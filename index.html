<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Post App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/emoji-picker-element@1.12.0/dist/emoji-picker.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar mb-5 navbar-expand-lg navbar-light navbar-custom fixed-top text-white">
        <div class="container">
            <a class="navbar-brand text-white display-1 fw-bold py-3" href="#">
                <i class="fas fa-share-alt"></i> SocialPost
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link active text-white" href="#"><i class="fas fa-home text-white"></i> Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white" href="#"><i class="fas fa-bell"></i> Notifications</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white" href="#"><i class="fas fa-envelope"></i> Messages</a>
                    </li>
                </ul>
                <div class="d-flex align-items-center">
                    <img src="./images/user female.jpg" class="user-avatar" alt="User">
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="main-content gy-5 bg-dark">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-8 col-md-10">
                    <!-- Post Creator -->
                    <div class="bg-transparent text-white p-3 shadow post-creator mb-4">
                        <div class="d-flex align-items-center mb-3">
                            <img src="./images/user female.jpg" class="user-avatar me-3" alt="User">
                            <h5 class="mb-0">What's on your mind?</h5>
                        </div>
                        <textarea id="postText" class="form-control mb-3 bg-transparent text-white" placeholder="Share your thoughts..." rows="3"></textarea>

                        <div id="mediaPreview" class="mb-3"></div>

                        <div class="d-flex flex-wrap gap-4 mb-2">
                            <button class="btn text-white btn-outline-primary btn-sm media-btn"
                                onclick="document.getElementById('imageInput').click()">
                                <i class="fas fa-image"></i> Photo
                            </button>
                            <button class="btn btn-outline-primary btn-sm media-btn"
                                onclick="document.getElementById('videoInput').click()">
                                <i class="fas fa-video"></i> Video
                            </button>
                            <button class="btn btn-outline-primary btn-sm media-btn"
                                onclick="document.getElementById('audioInput').click()">
                                <i class="fas fa-music"></i> Audio
                            </button>
                            <button class="btn btn-outline-primary btn-sm media-btn" onclick="startRecording()">
                                <i class="fas fa-microphone"></i> Voice
                            </button>
                            <button class="btn btn1 btn-outline-primary btn-sm media-btn">
                                <i class="far fa-smile"></i> Emoji
                            </button>
                        </div>


                        <!-- Hidden File Inputs -->
                        <input type="file" id="imageInput" accept="image/*" style="display:none" multiple>
                        <input type="file" id="videoInput" accept="video/*" style="display:none" multiple>
                        <input type="file" id="audioInput" accept="audio/*" style="display:none" multiple>

                        <button class="btn btn-primary post-btn" onclick="createPost()">
                            <span class="post-btn-text">Post</span>
                            <span class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
                        </button>
                    </div>

                    <!-- Posts Area -->
                    <div id="postArea"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Recording Modal -->
    <div class="modal fade recording-modal" id="recordingModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="fas fa-microphone me-2"></i>Voice Recording</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body text-center">
                    <div class="recording-animation mb-3">
                        <div class="bar"></div>
                        <div class="bar"></div>
                        <div class="bar"></div>
                        <div class="bar"></div>
                        <div class="bar"></div>
                    </div>
                    <p id="recordingStatus" class="mb-3">Ready to record</p>
                    <audio id="audioPreview" controls class="w-100 mb-3 d-none"></audio>
                </div>
                <div class="modal-footer justify-content-center">
                    <button id="startRecordBtn" class="btn btn-danger" onclick="toggleRecording()">
                        <i class="fas fa-microphone me-2"></i>Start Recording
                    </button>
                    <button id="stopRecordBtn" class="btn btn-secondary d-none" onclick="toggleRecording()">
                        <i class="fas fa-stop me-2"></i>Stop Recording
                    </button>
                    <button id="saveRecordBtn" class="btn btn-success d-none" onclick="saveRecording()">
                        <i class="fas fa-save me-2"></i>Save Recording
                    </button>
                </div>
            </div>
        </div>
    </div>





    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
   <script src="Emoji.js"></script>
   <script>
     new EmojiPicker({
        trigger:[
            {
                insertInto:['#postText',],
                selector:'.btn1'
            }
        ],
        closeButton: true,
        dragButton:true
     })
   </script>
    

</body>
</html>
